<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RLA World Cup S4</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-user-select:none; }

  body {
    background: #050810;
    color: #e8eaf0;
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    overflow: hidden;
  }

  body::before {
    content:'';
    position:fixed; inset:0; z-index:0;
    background:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(244,196,48,0.13) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 100%, rgba(0,212,255,0.08) 0%, transparent 60%);
    pointer-events:none;
  }

  .container {
    position: relative; z-index: 1;
    padding: 2rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
  }

  .eyebrow {
    font-family: 'Orbitron';
    font-size: 11px;
    letter-spacing: 4px;
    color: #f4c430;
    text-transform: uppercase;
    opacity: 0;
    animation: fadeUp 0.6s ease 0.2s forwards;
  }

  .title {
    font-family: 'Bebas Neue';
    font-size: clamp(3rem, 10vw, 6rem);
    letter-spacing: 4px;
    color: #e8eaf0;
    line-height: 0.95;
    opacity: 0;
    animation: fadeUp 0.6s ease 0.4s forwards;
  }

  .title span { color: #f4c430; }

  .sub {
    font-size: clamp(1rem, 2.5vw, 1.2rem);
    color: #9ca3af;
    letter-spacing: 1px;
    max-width: 480px;
    line-height: 1.6;
    opacity: 0;
    animation: fadeUp 0.6s ease 0.6s forwards;
  }

  .discord-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: #5865F2;
    color: white;
    font-family: 'Rajdhani';
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    text-decoration: none;
    padding: 14px 28px;
    border-radius: 12px;
    transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 0 30px rgba(88,101,242,0.4);
    opacity: 0;
    animation: fadeUp 0.6s ease 0.8s forwards;
  }

  .discord-btn:hover {
    background: #4752c4;
    transform: translateY(-3px);
    box-shadow: 0 0 40px rgba(88,101,242,0.6);
  }

  .discord-icon {
    width: 22px;
    height: 22px;
    fill: white;
    flex-shrink: 0;
  }

  .divider {
    width: 60px; height: 2px;
    background: linear-gradient(90deg, transparent, #f4c430, transparent);
    opacity: 0;
    animation: fadeUp 0.6s ease 0.7s forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body oncontextmenu="return false">

<div class="container">
  <div class="eyebrow">RLA World Cup · Temporada 4</div>
  <div class="title">Estamos<br><span>de vuelta.</span></div>
  <div class="sub">La RLA World Cup S4 regresa. Únete al servidor oficial de Discord para estar al tanto de todo.</div>
  <div class="divider"></div>
  <a class="discord-btn" href="https://discord.gg/Zwtf3APa6n" target="_blank">
    <svg class="discord-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/>
    </svg>
    Únete al Discord
  </a>
</div>

<script>
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('selectstart', e => e.preventDefault());
document.addEventListener('copy', e => e.preventDefault());
document.addEventListener('keydown', e => {
  if (e.key === 'F12' || (e.ctrlKey && ['u','s','c','a'].includes(e.key.toLowerCase()))) e.preventDefault();
});
</script>
</body>
</html>
