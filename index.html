<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RLA World Cup S4</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-user-select:none; }
  body {
    background: #050810;
    color: #e8eaf0;
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  .container {
    padding: 2rem;
  }
  .title {
    font-family: 'Bebas Neue';
    font-size: clamp(2rem, 6vw, 4rem);
    letter-spacing: 4px;
    color: #f4c430;
    margin-bottom: 1rem;
  }
  .sub {
    font-size: clamp(1rem, 3vw, 1.4rem);
    color: #9ca3af;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="title">Humberto borró la liga.</div>
    <div class="sub">Yo no tuve nada que ver. - Alan</div>
  </div>
<script>
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('selectstart', e => e.preventDefault());
document.addEventListener('copy', e => e.preventDefault());
document.addEventListener('keydown', e => {
  if (e.key === 'F12' || (e.ctrlKey && ['u','s','c','a'].includes(e.key.toLowerCase()))) e.preventDefault();
});
</script>
</body>
</html>
